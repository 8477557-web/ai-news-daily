name: 每日 AI 新闻摘要

on:
  schedule:
    # 北京时间每天早上 8:10 (UTC 00:10)，避开整点高峰
    - cron: "10 0 * * *"
  workflow_dispatch:

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取新闻并生成摘要
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/fetch_ai_news.py

      - name: 生成静态站点
        run: |
          python .github/scripts/generate_html.py
          python .github/scripts/generate_page.py

      - name: 提交并推送
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet && git diff --cached --quiet; then
            echo "没有新的简报生成"
            exit 0
          fi
          DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          git add digests/ index.html
          if compgen -G "page-*.html" > /dev/null; then
            git add page-*.html
          fi
          git commit -m "AI News Daily: ${DATE}"
          git push
